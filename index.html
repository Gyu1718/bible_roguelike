<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="이름 없는 증인들: 성경 세계관 텍스트 로그라이크" />
    <title>이름 없는 증인들</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(126, 67, 30, 0.25), transparent 34rem),
          radial-gradient(circle at top right, rgba(36, 83, 112, 0.18), transparent 34rem),
          #080706;
        color: #f4efe6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      button { font: inherit; cursor: pointer; }
      .app { width: min(1180px, 100%); margin: 0 auto; padding: 24px; }
      .top { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 22px; }
      .eyebrow { margin: 0 0 8px; color: #d7b46a; font-size: 12px; letter-spacing: .16em; font-weight: 800; }
      h1 { margin: 0; font-size: clamp(36px, 7vw, 72px); letter-spacing: -.075em; line-height: .96; }
      h2 { margin: 0 0 16px; font-size: clamp(28px, 4vw, 48px); letter-spacing: -.055em; line-height: 1.08; }
      p { color: #d6cbbb; line-height: 1.8; font-size: 17px; }
      .layout { display: grid; grid-template-columns: .9fr 1.1fr 280px; gap: 16px; align-items: start; }
      .card, .art, .side { border: 1px solid rgba(222,190,125,.2); background: rgba(24,20,17,.88); border-radius: 28px; padding: 24px; box-shadow: 0 28px 90px rgba(0,0,0,.35); }
      .art { min-height: 360px; display: grid; place-items: end start; background: linear-gradient(135deg, rgba(119,57,31,.55), rgba(12,36,55,.74)), #15110e; overflow: hidden; position: relative; }
      .art::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 50% 30%, rgba(231,204,139,.22), transparent 26rem); }
      .art > div { position: relative; z-index: 1; }
      .choices { display: grid; gap: 12px; margin-top: 28px; }
      .choices button, .primary, .secondary { border: 0; border-radius: 18px; padding: 16px 18px; font-weight: 800; }
      .choices button { text-align: left; color: #f4efe6; background: rgba(215,180,106,.1); border: 1px solid rgba(215,180,106,.24); }
      .choices button:hover { background: rgba(215,180,106,.18); }
      .primary { background: linear-gradient(135deg, #e3c887, #9d6a32); color: #16100c; }
      .secondary { background: rgba(255,255,255,.06); color: #f4efe6; border: 1px solid rgba(255,255,255,.14); }
      .stat { margin-bottom: 14px; }
      .stat-row { display: flex; justify-content: space-between; margin-bottom: 7px; color: #b9aa92; }
      .bar { height: 9px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; }
      .fill { height: 100%; background: #d7b46a; border-radius: 999px; }
      .fill.panic { background: #a23b30; }
      .log p { margin: 0; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.08); font-size: 14px; color: #b9aa92; }
      .meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 22px 0; }
      .meta div { background: rgba(0,0,0,.22); border: 1px solid rgba(255,255,255,.1); border-radius: 18px; padding: 14px; }
      .meta span { display: block; color: #b9aa92; font-size: 13px; margin-bottom: 4px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; }
      @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .top { flex-direction: column; align-items: start; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const endings = {
        trueWitness: { title: "해방의 증인", text: "당신은 바다 사이를 걸었다. 제국은 당신의 몸을 부렸지만, 당신의 마지막 말까지 소유하지는 못했다. 당신은 그 밤을 살아남았고, 그 사건을 증언으로 남겼다." },
        survivor: { title: "살아남은 자", text: "당신은 바다를 건넜다. 그러나 아직 그 밤의 의미를 다 알지는 못한다. 생존은 끝이 아니라, 해방을 배워가는 긴 시작이었다." },
        terror: { title: "공포에 붙잡힌 자", text: "당신은 애굽을 떠났지만, 애굽의 공포는 당신을 놓아주지 않았다. 자유의 길은 열렸으나, 마음은 아직 닫힌 문 앞에 서 있었다." },
        collapse: { title: "무너진 자", text: "채찍과 밤과 도망의 무게를 몸이 견디지 못했다. 해방의 소문은 가까이 있었지만, 당신은 그 길 위에 끝까지 서지 못했다." },
        silent: { title: "침묵한 생존자", text: "당신은 모든 것을 보았다. 그러나 그것을 말로 남기지 못했다. 바다는 갈라졌지만, 당신 안의 언어는 아직 열리지 않았다." },
        rebellionCrushed: { title: "채찍 아래의 반란", text: "당신은 감독관에게 달려들었다. 분노는 정당했지만, 그날의 힘은 당신 편이 아니었다. 제국은 당신의 분노를 빌미로 더 많은 등을 찢었다." },
        informer: { title: "밀고자의 밤", text: "당신은 모세의 소문을 감독관에게 넘겼다. 그날 밤, 노예들의 집에는 더 긴 침묵이 내려앉았다." },
        egyptianShelter: { title: "남의 문 아래 숨은 자", text: "당신은 애굽인의 집으로 숨어들었다. 익숙한 권력 곁이면 안전할 줄 알았다. 그러나 그 밤, 남의 문은 당신을 지켜주지 못했다." },
        unmarkedDoor: { title: "표식 없는 문", text: "당신은 피를 바르지 않았다. 그 밤이 지나간 뒤, 집 안의 침묵은 다시는 이전의 침묵이 아니었다." },
        leftHouse: { title: "문밖의 밤", text: "당신은 불안을 견디지 못하고 문밖으로 나갔다. 그 밤에는 머무름이 순종이었다." },
        returnEgypt: { title: "돌아간 발걸음", text: "병거 소리가 가까워지자 당신은 행렬을 벗어나 애굽 쪽으로 달렸다. 뒤돌아간 발은 자유의 길을 보지 못했다." },
        chariotRush: { title: "병거 앞으로 달려간 자", text: "당신은 공포를 이기기 위해 앞으로 달렸다. 그러나 애굽의 병거는 개인의 용기로 막을 수 있는 것이 아니었다." },
        drownedFear: { title: "먼저 뛰어든 자", text: "당신은 기다리지 못하고 어둠 속 바다로 뛰어들었다. 두려움은 때로 용기처럼 위장한다. 그러나 길은 열리기 전에 붙잡을 수 있는 것이 아니었다." }
      };

      const scenes = [
        { title: "벽돌 굽는 날", art: "진흙 구덩이와 벽돌 노동", text: "새벽이 오기 전, 당신은 진흙 구덩이에 발을 넣는다. 짚은 부족하고, 감독관은 오늘도 같은 수량의 벽돌을 요구한다.", choices: [
          { label: "할당량을 채우기 위해 이를 악문다", effects: { endurance: -2, panic: 1 }, title: "몸은 버텼지만 마음은 굳어졌다", text: "손이 갈라질 때까지 벽돌을 찍었다. 살아남는 법은 배웠지만, 사람을 보는 눈은 조금 흐려졌다." },
          { label: "쓰러진 동료를 일으킨다", effects: { endurance: -3, witness: 2 }, title: "채찍보다 먼저 보인 얼굴", text: "그 선택은 몸을 더 지치게 했지만, 훗날 증언이 될 기억 하나를 남겼다." },
          { label: "감독관의 눈을 피해 숨을 고른다", effects: { endurance: 1, panic: 1 }, title: "숨은 고르지만 공포도 자란다", text: "당신은 몸을 낮췄다. 그러나 숨어 있는 동안 두려움도 함께 자리를 잡았다." }
        ]},
        { title: "채찍 소리", art: "감독관과 채찍", text: "감독관이 노인을 끌어낸다. 그는 오늘 몫을 채우지 못했다. 사람들은 고개를 숙이고, 채찍은 이미 올라가 있다.", choices: [
          { label: "고개를 숙이고 살아남는다", effects: { endurance: 1, panic: 2, witness: -1 }, title: "살아남았지만 장면이 남았다", text: "몸은 안전했지만, 채찍 소리는 마음 안쪽에 더 오래 남았다." },
          { label: "노인을 대신해 한 걸음 나선다", effects: { endurance: -3, witness: 3, panic: 1 }, title: "한 걸음의 대가", text: "제국은 그것을 어리석음이라 불렀지만, 당신은 그 얼굴을 잊지 않았다." },
          { label: "감독관에게 달려든다", badEnding: "rebellionCrushed", title: "즉시 배드엔딩 분기", text: "분노는 정당했다. 그러나 지금 이 자리의 반란은 공동체 전체를 더 위험하게 만들었다." }
        ]},
        { title: "짚 없는 명령", art: "짚 없는 벽돌", text: "짚은 주어지지 않았다. 그러나 벽돌 수량은 그대로였다. 사람들은 모세의 이름을 원망하기 시작한다.", choices: [
          { label: "모세 때문에 고통이 커졌다고 원망한다", effects: { panic: 2, witness: -1 }, title: "해방의 말이 채찍처럼 들렸다", text: "원망은 고통을 설명해주어도, 길을 열어주지는 못했다." },
          { label: "그 이름을 마음에 담아둔다", effects: { witness: 2, panic: 1 }, title: "아직 믿음은 아니지만 기억이 되었다", text: "확신은 없었다. 그래도 당신은 모세라는 이름을 지우지 않았다." },
          { label: "그 소문을 감독관에게 알린다", badEnding: "informer", title: "즉시 배드엔딩 분기", text: "당신은 위험을 피하려고 소문을 넘겼다. 하지만 공동체의 밤은 더 어두워졌다." }
        ]},
        { title: "어둠의 사흘", art: "재앙이 덮은 애굽", text: "낮인데도 어둠이 내려앉는다. 애굽의 집들은 숨죽이고, 사람들은 벽을 더듬는다.", choices: [
          { label: "어둠 속에서 본 일을 마음에 새긴다", effects: { witness: 3, panic: -1 }, title: "어둠 속의 구별", text: "당신은 빛을 설명하지 못했다. 그러나 그 구별을 보았다." },
          { label: "공포에 눌려 아무 말도 하지 않는다", effects: { panic: 2, witness: -1 }, title: "침묵이 깊어진다", text: "침묵은 때로 두려움의 방이 되었다." },
          { label: "애굽인의 집으로 숨어들어 보호를 구한다", badEnding: "egyptianShelter", title: "즉시 배드엔딩 분기", text: "권력 곁이 안전하다고 생각했다. 그러나 그 밤의 안전은 권력의 지붕 아래 있지 않았다." }
        ]},
        { title: "문설주의 피", art: "피가 발린 문설주", text: "그 밤, 말씀은 구체적이었다. 어린 양, 피, 문설주, 허리에 띤 띠, 발의 신, 손의 지팡이.", choices: [
          { label: "문설주에 피를 바른다", effects: { witness: 3, panic: -1 }, title: "표식은 말보다 먼저 남았다", text: "당신은 그 의미를 다 알지 못했지만, 말씀을 몸으로 따랐다." },
          { label: "피를 바르지 않고 안에서 버틴다", badEnding: "unmarkedDoor", title: "즉시 배드엔딩 분기", text: "당신은 표식을 미루었다. 그러나 그 밤은 미룬 결정을 기다려주지 않았다." },
          { label: "불안을 견디지 못해 문밖으로 나간다", badEnding: "leftHouse", title: "즉시 배드엔딩 분기", text: "당신은 상황을 확인하고 싶었다. 그러나 그 밤에는 머무름이 순종이었다." }
        ]},
        { title: "급히 떠나는 새벽", art: "급히 떠나는 새벽", text: "울음소리와 외침이 애굽을 가른다. 자유는 노래보다 먼저 혼란의 발걸음으로 왔다.", choices: [
          { label: "뒤돌아보지 않고 행렬을 따라간다", effects: { endurance: -1, witness: 1 }, title: "노예의 길에서 낯선 길로", text: "당신은 익숙한 길을 버리고 낯선 길에 발을 올렸다." },
          { label: "망설이는 이들을 기다리다 늦어진다", effects: { endurance: -2, witness: 2, panic: 1 }, title: "함께 늦게 걷는 길", text: "혼자 빠르게 사는 길보다 함께 늦게 걷는 길을 택했다." },
          { label: "애굽으로 돌아가 숨는다", badEnding: "returnEgypt", title: "즉시 배드엔딩 분기", text: "익숙한 공포가 낯선 자유보다 안전하다고 느꼈다. 그러나 돌아간 길은 더 이상 집이 아니었다." }
        ]},
        { title: "뒤에서 들리는 병거", art: "광야의 먼지와 병거 소리", text: "광야의 먼지 사이로 낮은 진동이 들린다. 병거다. 애굽이 따라오고 있다.", choices: [
          { label: "행렬 안쪽으로 들어가 숨을 고른다", effects: { panic: -1, endurance: 1 }, title: "공포를 늦추다", text: "공포는 사라지지 않았지만, 당신을 끌고 가지도 못했다." },
          { label: "주변 사람들에게 병거가 온다고 외친다", effects: { panic: 2, witness: 1 }, title: "경고는 필요했지만 공포도 번졌다", text: "당신의 외침은 사람들을 깨웠다. 그러나 공포도 함께 퍼졌다." },
          { label: "병거 쪽으로 달려가 항복하겠다고 외친다", badEnding: "returnEgypt", title: "즉시 배드엔딩 분기", text: "목숨을 구하려고 돌아섰다. 그러나 그 길은 구원이 아니라 다시 묶임으로 이어졌다." }
        ]},
        { title: "바다 앞에서", art: "바다 앞의 밤", text: "뒤에서는 병거 소리가 가까워진다. 앞에는 바다가 있다. 사람들은 원망하고, 밤바람은 소금 냄새를 실어온다.", choices: [
          { label: "원망하는 무리에 섞인다", effects: { panic: 3, witness: -2 }, title: "말은 쉬웠고 공포는 빨랐다", text: "공포는 사람을 과거로 되돌린다." },
          { label: "가만히 서서 바다를 바라본다", effects: { panic: -1, witness: 2 }, title: "아무것도 못할 때 보는 법을 배운다", text: "그 밤의 침묵은 패배가 아니었다." },
          { label: "병거 앞으로 달려가 막으려 한다", badEnding: "chariotRush", title: "즉시 배드엔딩 분기", text: "용기와 무모함은 같은 말이 아니었다." },
          { label: "기다리지 못하고 바다로 먼저 뛰어든다", badEnding: "drownedFear", title: "즉시 배드엔딩 분기", text: "아직 길은 열리지 않았다." }
        ]},
        { title: "벽돌 굽던 발이 바다 사이를 걷다", art: "물벽 사이의 길", text: "모세가 지팡이를 든다. 밤새 바람이 분다. 바다가 물러난다. 당신은 진흙과 벽돌만 알던 발로, 물벽 사이의 마른 길을 밟는다.", final: true }
      ];

      let state = { screen: "home", index: 0, stats: { endurance: 10, panic: 5, witness: 0 }, feedback: null, ending: null, log: ["새로운 목격자의 기록이 열렸다."] };

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function apply(effects = {}) {
        const next = { ...state.stats };
        Object.entries(effects).forEach(([k, v]) => next[k] = clamp((next[k] || 0) + v, 0, k === "panic" ? 14 : 20));
        state.stats = next;
      }
      function evaluate() {
        const s = state.stats;
        if (s.endurance <= 0) return endings.collapse;
        if (s.panic >= 12) return endings.terror;
        if (s.witness >= 12 && s.panic <= 7) return endings.trueWitness;
        if (s.witness <= 5) return endings.silent;
        return endings.survivor;
      }
      function choose(i) {
        const choice = scenes[state.index].choices[i];
        apply(choice.effects);
        state.log.unshift(choice.text);
        state.log = state.log.slice(0, 6);
        state.feedback = choice;
        if (choice.badEnding) state.feedback.next = "bad";
        else if (state.stats.endurance <= 0 || state.stats.panic >= 14) state.feedback.next = "ending";
        else state.feedback.next = "continue";
        state.screen = "feedback";
        render();
      }
      function proceed() {
        if (state.feedback?.next === "bad") { state.ending = endings[state.feedback.badEnding]; state.screen = "ending"; render(); return; }
        if (state.feedback?.next === "ending") { state.ending = evaluate(); state.screen = "ending"; render(); return; }
        state.index += 1;
        if (scenes[state.index]?.final) { state.ending = evaluate(); state.screen = "ending"; render(); return; }
        state.feedback = null;
        state.screen = "play";
        render();
      }
      function restart() { state = { screen: "play", index: 0, stats: { endurance: 10, panic: 5, witness: 0 }, feedback: null, ending: null, log: ["벽돌과 바다 기록을 시작했다."] }; render(); }
      function bar(key, value) { return `<div class="stat"><div class="stat-row"><span>${key}</span><strong>${value}</strong></div><div class="bar"><div class="fill ${key==='공포'?'panic':''}" style="width:${Math.min(100, value*8)}%"></div></div></div>`; }
      function side() { const s = state.stats; return `<aside class="side"><h3>상태</h3>${bar('생존',s.endurance)}${bar('공포',s.panic)}${bar('증언',s.witness)}<div class="log"><h3>기록</h3>${state.log.map(x=>`<p>${x}</p>`).join('')}</div></aside>`; }
      function render() {
        const root = document.getElementById('root');
        const scene = scenes[state.index] || scenes[0];
        let body = '';
        if (state.screen === 'home') {
          body = `<main class="layout"><section class="art"><div><p class="eyebrow">BIBLICAL WITNESS ROGUELIKE</p><h2>물벽 사이의 길</h2></div></section><section class="card"><p class="eyebrow">1편</p><h2>벽돌과 바다</h2><p>핍박받던 히브리 노예가 출애굽을 경험하는 선택지형 로그라이크입니다. 잘못된 선택은 즉시 배드엔딩으로 이어집니다.</p><button class="primary" onclick="restart()">시작하기</button></section>${side()}</main>`;
        } else if (state.screen === 'feedback') {
          const f = state.feedback;
          body = `<main class="layout"><section class="art"><div><p class="eyebrow">선택의 결과</p><h2>${scene.art}</h2></div></section><section class="card"><p class="eyebrow">선택의 결과</p><h2>${f.title}</h2><p>${f.text}</p><div class="meta"><div><span>생존</span><strong>${state.stats.endurance}</strong></div><div><span>공포</span><strong>${state.stats.panic}</strong></div><div><span>증언</span><strong>${state.stats.witness}</strong></div><div><span>분기</span><strong>${f.next==='bad'?'배드엔딩':'계속 진행'}</strong></div></div><button class="primary" onclick="proceed()">${f.next==='bad'?'배드엔딩 확인':'계속'}</button></section>${side()}</main>`;
        } else if (state.screen === 'ending') {
          const e = state.ending;
          body = `<main class="layout"><section class="art"><div><p class="eyebrow">목격의 끝</p><h2>물벽 사이의 길</h2></div></section><section class="card"><p class="eyebrow">엔딩</p><h2>${e.title}</h2><p>${e.text}</p><div class="row"><button class="primary" onclick="restart()">다시 도전</button><button class="secondary" onclick="state.screen='home';render()">처음으로</button></div></section>${side()}</main>`;
        } else {
          body = `<main class="layout"><section class="art"><div><p class="eyebrow">ILLUSTRATION</p><h2>${scene.art}</h2></div></section><section class="card"><p class="eyebrow">벽돌과 바다 · ${state.index+1}/${scenes.length}</p><h2>${scene.title}</h2><p>${scene.text}</p><div class="choices">${scene.choices.map((c,i)=>`<button onclick="choose(${i})">${c.label}</button>`).join('')}</div></section>${side()}</main>`;
        }
        root.innerHTML = `<div class="app"><header class="top"><div><p class="eyebrow">BIBLICAL WITNESS ROGUELIKE</p><h1>이름 없는 증인들</h1><p>성경 세계관 선택지형 로그라이크</p></div><button class="secondary" onclick="restart()">새 회차</button></header>${body}</div>`;
      }
      window.restart = restart;
      window.choose = choose;
      window.proceed = proceed;
      window.state = state;
      window.render = render;
      render();
    </script>
  </body>
</html>
